<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildly — Show what you build.</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&family=Caprasimo&family=Cookie&family=Great+Vibes&family=Imperial+Script&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=TikTok+Sans:opsz,wdth@12..36,138&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="mobile-bottom-nav">
        <a href="index.html">
            <i data-lucide="house"></i>
            <span>Home</span>
        </a>
        <a>
            <i data-lucide="compass"></i>
            <span>Explore</span>
        </a>
        <a onclick="modalProject.style.display = 'flex'">
            <i data-lucide="plus"></i>
        </a>
        <a>
            <i data-lucide="MessageCircle"></i>
            <span>Messages</span>
        </a>
        <a id="user">
            <i data-lucide="circle-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="buildy">
        <aside class="aside-left">
            <h1>Buildly</h1>
            <div class="aside-location">
                <button onclick="window.location.href = 'index.html'">
                    <i class="icon-lucide" data-lucide="home"></i>
                    Asosiy
                </button>
                <button class="bg-btn" onclick="window.location.href = 'programist.html'">
                    <i class="icon-lucide" data-lucide="CodeXml"></i>
                    Dasturchilar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="FolderGit2"></i>
                    Loyihalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="users"></i>
                    Jamoalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="compass"></i>
                    Kashf qiling
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="bookmark"></i>
                    Saqlanganlar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="MessageCircle"></i>
                    Xabarlar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="settings"></i>
                    Sozlamalar
                </button>
                <div class="profile-card" id="profile-card">
                    <p>Ishlab chiquvchi profilingizni yarating, loyihalaringizni namoyish qiling va quruvchilar bilan
                        bog'laning.</p>
                    <button onclick="modal1.style.display = 'flex'">Ro'yxatdan o'tish</button>
                </div>
                <div class="aside-profile" onclick="window.location.href = 'profile.html'">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <img id="user-avatar"
                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png"
                            alt="user-avatar">
                        <div>
                            <h2 id="userNamee"></h2>
                            <p id="userNikk"></p>
                        </div>
                    </div>
                    <div class="log">
                        <i class="icon-lucide" data-lucide="LogOut"></i>
                    </div>
                </div>
            </div>
        </aside>
        <div class="container">
            <main>
                <header></header>
                <div class="loader">
                    <svg id="svg" viewBox="25 25 50 50">
                        <circle class="circle" r="20" cy="50" cx="50"></circle>
                    </svg>
                </div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal"></div>
    <div class="modal-project" id="modal-project"></div>

    <script src="js/index.js"></script>

    <script>
        // avatar

        const userNamee = document.getElementById("userNamee").textContent = localStorage.getItem("name");
        const userNikk = document.getElementById("userNikk").textContent = '@' + localStorage.getItem("nik");

        const avatar = document.getElementById("user-avatar");
        const savedAvatar = localStorage.getItem("avatar");

        if (savedAvatar) {
            avatar.src = savedAvatar;
        }

        // loader

        const loader = document.querySelector(".loader");

        setTimeout(() => {
            loader.style.display = "none"
        }, 3000);
    </script>

</body>

</html>
