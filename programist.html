<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildly — Show what you build.</title>
    <link rel="stylesheet" href="css/programist.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&family=Caprasimo&family=Cookie&family=Great+Vibes&family=Imperial+Script&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=TikTok+Sans:opsz,wdth@12..36,138&display=swap"

<body>

    <div class="aside"></div>

    <nav class="mobile-bottom-nav">
        <a href="home.html">
            <i data-lucide="house"></i>
        </a>
        <a>
            <i data-lucide="compass"></i>
        </a>
        <a id="plus">
            <i data-lucide="plus"></i>
        </a>
        <a>
            <i data-lucide="MessageCircle"></i>
        </a>
        <a id="user">
            <i data-lucide="circle-user"></i>
        </a>
    </nav>

    <div class="buildy">
        <aside class="aside-left"></aside>
        <div class="container">
            <main>
                <header></header>
                <div class="skill">
                    <h1>Dasturchilar</h1>
                    <p>Yangi hamkorlar toping va kuchli jamoalar yarating</p>
                    <div class="btn-group">
                        <button class="filter-btn">Barchasi</button>
                        <button class="filter-btn">Frontend</button>
                        <button class="filter-btn">Backend</button>
                        <button class="filter-btn">Full-stack</button>
                        <button class="filter-btn">Mobile</button>
                        <button class="filter-btn">AI</button>
                        <button class="filter-btn">Designer</button>
                    </div>
                </div>
                <div id="developers"></div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal"></div>
    <div class="modal-project" id="modal-project"></div>

    <script src="js/navbar.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/aside-left.js"></script>
    <script src="js/addProject.js"></script>
    <script src="js/aside-right.js"></script>
    <script src="js/modal-registar.js"></script>

    <script>
        // users

        const fakeDevelopers = document.getElementById("developers")

        const developers = [
            {
                name: "Jasur Erkinov",
                nik: "@erkinov",
                role: "🚀 Full Stack Developer",
                avatar: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png"
            },
            {
                name: "Azizbek Rahimov",
                nik: "@azizbek",
                role: "🎨 Frontend Developer",
                avatar: "https://www.hackreactor.com/wp-content/uploads/2024/08/AdobeStock_352231270-750x422.jpeg"
            },
            {
                name: "Madina Karimova",
                nik: "@madina",
                role: "✨ UI/UX Designer",
                avatar: "https://images.unsplash.com/photo-1485470733090-0aae1788d5af?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8d2FsbHBhcGVyJTIwNGt8ZW58MHx8MHx8fDA%3D"
            },
            {
                name: "Dilnoza Usmonova",
                nik: "@dilnoza",
                role: "📱 Mobile Developer",
                avatar: "https://randomuser.me/api/portraits/women/65.jpg"
            },
            {
                name: "Muhammadali Sobirov",
                nik: "@muhammadali",
                role: "🤖 AI Engineer",
                avatar: "https://randomuser.me/api/portraits/men/73.jpg"
            },
            {
                name: "Jahongir Islomov",
                nik: "@jahongir",
                role: "🔥 Next.js Developer",
                avatar: "https://randomuser.me/api/portraits/men/22.jpg"
            },
            {
                name: "Erkinov Jasur",
                nik: "@erkinov",
                role: "🌿 Frontend Developer",
                avatar: "https://wallpaperaccess.com/full/30097.jpg"
            },
            {
                name: "Karim",
                nik: "@rashid o'g'li",
                role: "⚙️ Backend Developer",
                avatar: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsJyjPCWIpJ5XieQLxeykSl6JxNL05ZGUfble9MMRqbA&s=10"
            }
        ];

        function data(data) {
            data.map((item) => {
                fakeDevelopers.innerHTML += `
                    <div class="users">
                        <img src="${item.avatar}"></img>
                        <div>
                            <h2>${item.name}</h2>
                            <p>${item.role}</p>
                        </div>
                        <button title="Obuna bo'lish">
                            <i data-lucide="user-plus"></i>
                        </button>
                    </div>
                `;
            });
        }

        data(developers)

        // button bosilishi

        const buttons = document.querySelectorAll('.skill button');

        buttons.forEach(button => {
            button.addEventListener('click', function () {
                buttons.forEach(btn => btn.classList.remove('selected'));

                this.classList.add('selected');
            });
        });

        const filterBtn = document.querySelectorAll(".filter-btn");

        filterBtn.forEach((btn) => {
            btn.addEventListener("click", function () {
                const selectedRole = this.innerText;

                const filterData = (selectedRole === "Barchasi")
                    ? developers
                    : developers.filter((dev) => dev.role.includes(selectedRole));

                data(filterData);
            });
        });

        function dataArr(arr) {
            fakeDevelopers.innerHTML = ""

            arr.forEach(devs => {
                fakeDevelopers.innerHTML += `
                    <div class="users">
                        <img src="${devs.avatar}"></img>
                        <div>
                            <h2>${devs.name}</h2>
                            <p>${devs.role}</p>
                        </div>
                        <button title="Obuna bo'lish">
                            <i data-lucide="user-plus"></i>
                        </button>
                    </div>
                `
            });

        }

    </script>

</body>

</html>
