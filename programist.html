        function data(data) {
            data.map((item) => {
                fakeDevelopers.innerHTML += `
                    <div class="users">

                        <div>

                `;

        }

        data(developers)

        // button bosilishi

        const buttons = document.querySelectorAll('.skill button');

        buttons.forEach(button => {
            button.addEventListener('click', function () {
                buttons.forEach(btn => btn.classList.remove('selected'));

                this.classList.add('selected');
            });
        });

        const filterBtn = document.querySelectorAll(".filter-btn");

        filterBtn.forEach((btn) => {
            btn.addEventListener("click", function () {
                fakeDevelopers.innerHTML = null
                const selectedRole = this.innerText;

                const filterData = (selectedRole === "Barchasi")
                    ? developers
                    : developers.filter((dev) => dev.role.includes(selectedRole));

                data(filterData);
                lucide.createIcons()
            });
        });

        function dataArr(arr) {

            arr.forEach(devs => {

                fakeDevelopers.innerHTML += `
