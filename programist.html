    <link rel="stylesheet" href="css/all.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <div class="aside"></div>

    <div class="buildy">
        <aside class="aside-left">
            <h1>Buildly</h1>
            <div class="aside-location">
                <button onclick="window.location.href = 'index.html'">
                    <i class="icon-lucide" data-lucide="home"></i>
                    Asosiy
                </button>
                <button class="bg-btn" onclick="window.location.href = 'programist.html'">
                    <i class="icon-lucide" data-lucide="CodeXml"></i>
                    Dasturchilar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="FolderGit2"></i>
                    Loyihalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="users"></i>
                    Jamoalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="compass"></i>
                    Kashf qiling
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="bookmark"></i>
                    Saqlanganlar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="MessageCircle"></i>
                    Xabarlar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="settings"></i>

                </button>
                <div class="profile-card" id="profile-card">

                        bog'laning.</p>
                    <button onclick="modal1.style.display = 'flex'">Ro'yxatdan o'tish</button>
                </div>
                <div class="aside-profile" onclick="window.location.href = 'profile.html'">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <img id="user-avatar"
                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png"
                            alt="user-avatar">
                        <div>
                            <h2 id="userNamee"></h2>
                            <p id="userNikk"></p>
                        </div>
                    </div>
                    <div class="log">
                        <i class="icon-lucide" data-lucide="LogOut"></i>
                    </div>
                </div>
            </div>
        </aside>
        <div class="container">
            <main>
                <header></header>
                <div id="developers"></div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal"></div>
    <div class="modal-project" id="modal-project"></div>

    <script src="js/index.js"></script>

    <script>
        // avatar

        const userNamee = document.getElementById("userNamee").textContent = localStorage.getItem("name");
        const userNikk = document.getElementById("userNikk").textContent = '@' + localStorage.getItem("nik");

        const avatar = document.getElementById("user-avatar");
        const savedAvatar = localStorage.getItem("avatar");

        if (savedAvatar) {
            avatar.src = savedAvatar;
        }

            },
            {
                name: "Madina Karimova",

            data.map((item) => {
                fakeDevelopers.innerHTML += `

        data(developers)
