<body>

    <div class="aside"></div>

                    <div class="discovery-search">
                        <input type="search" placeholder="Loyiha yoki dasturchi qidirish">

                        <h2>Loyihalar</h2>

    <script type="module">
        import axios from "https://cdn.jsdelivr.net/npm/axios@1.11.0/+esm";
        const api = "https://6a41bddb7602860e6520687e.mockapi.io/postlar";

        const data = async () => {
            try {
                let responses = await axios.get(api);
                render(responses.data);
            } catch (error) {
                console.log(error);
            }
        }

        data()
        const card = document.querySelector(".projects-dad");

        function render(data) {
            data.slice(0, 6).map((item) => {
                card.innerHTML += `
                    <div class="project-card">
                        <div>
                            <img src="${item.avatar}" alt="avatar">
                            @${item.username}
                        </div>
                        <img src="${item.image}"
                            alt="" class="project-card-bg"/>
                        <h2>${item.postName}</h2>
                    </div>
                `;
            });
        }

    </script>

</body>
