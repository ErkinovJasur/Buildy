<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildly</title>
    <link rel="stylesheet" href="css/notification.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link sizes="16x16" rel="icon"
        href="https://chatgpt.com/backend-api/estuary/content?id=file_000000006fb8720aa81681203234e174&ts=495111&p=fs&cid=1&sig=d108db46f2c4b7aabf1cc25891de3edbde4235206ba00dbedb454e60d31fb399&v=0"
        type="" />

</head>

<body>

    <div class="aside"></div>
    <div class="mobile-bottom-nav"></div>

    <div class="buildy">
        <aside class="aside-left"></aside>
        <div class="container">
            <main>
                <header></header>
                <div class="notifications-page">
                    <div class="notifications-header">
                        <h1>Bildirishnomalar</h1>
                        <p>Sizga kelgan yangiliklar</p>
                    </div>
                    <div class="notification-list">
                        <div class="notification-card">
                            <div class="notification-icon">
                                <i data-lucide="user-plus"></i>
                            </div>
                            <div class="notification-content">
                                <h3>
                                    <span>Buildly</span> sizga obuna bo'ldi
                                </h3>
                                <p id="soat"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal-project" id="modal-project"></div>

    <script src="js/navbar.js"></script>
    <script src="js/aside-left.js"></script>
    <script src="js/modal-registar.js"></script>
    <script src="js/aside-right.js"></script>
    <script src="js/addProject.js"></script>
    <script src="js/searchModal.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script type="module" src="js/addProject.js"></script>

    <script>
        const soatElement = document.getElementById("soat");

        let savedTime = localStorage.getItem("soat");

        if (!savedTime) {
            const now = new Date();
            savedTime = `${now.toLocaleDateString()}`;
            localStorage.setItem("soat", savedTime);
        }

        soatElement.textContent = savedTime;

        if (localStorage.getItem("profileCard")) {
            document.querySelector(".notifications-page").style.display = "block"
        } else {
        }

        lucide.createIcons();
    </script>

</body>

</html>
