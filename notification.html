<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Buildly | Professional Platform</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/all.css">
    <style>
        :root {
            --bodyBg: #fef7ef;
            --cardBg: #ffffff;
            --text: #111827;
            --shadow: 0 10px 30px rgba(255, 127, 67, 0.177);
            --white: #ffffff;
            --btn: #ff610b;
            --border: #fed7aa;
            --gray: #9f9f9f;
        }

        .notifications-page {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .notifications-header h1 {
            font-size: 28px;
            margin: 0;
            color: var(--text);
        }

        .notifications-header p {
            margin-top: 8px;
            color: #64748b;
            font-size: 14px;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            margin-top: 30px;
        }

        .notification-card {
            background: #fff;
            border: 1px solid #fed7aa;
            border-radius: 18px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: .2s;
        }

        .notification-card:hover {
            transform: translateY(-3px);
            box-shadow:
                0 10px 30px rgba(255, 127, 67, .12);
        }

        .notification-icon {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            background: #fff1e8;
            color: var(--btn);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-icon svg {
            width: 22px;
        }

        .notification-content h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 500;
            color: #111827;
        }

        .notification-content h3 span {
            color: var(--btn);
            font-weight: 700;
        }

        .notification-content p {
            margin: 3px 0 0;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="aside"></div>

    <nav class="mobile-bottom-nav">
        <a href="index.html">
            <i data-lucide="house"></i>
        </a>
        <a>
            <i data-lucide="compass"></i>
        </a>
        <a id="plus">
            <i data-lucide="plus"></i>
        </a>
        <a>
            <i data-lucide="MessageCircle"></i>
        </a>
        <a id="user">
            <i data-lucide="circle-user"></i>
        </a>
    </nav>

    <div class="buildy">
        <aside class="aside-left"></aside>
        <div class="container">
            <main>
                <header></header>
                <div class="notifications-page">
                    <div class="notifications-header">
                        <h1>Bildirishnomalar</h1>
                        <p>Sizga kelgan yangiliklar</p>
                    </div>
                    <div class="notification-list">
                        <div class="notification-card">
                            <div class="notification-icon">
                                <i data-lucide="user-plus"></i>
                            </div>
                            <div class="notification-content">
                                <h3>
                                    <span>Buildly</span> sizga obuna bo‘ldi
                                </h3>
                                <p id="soat"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal"></div>
    <div class="modal-project" id="modal-project"></div>

    <script src="js/modal-registar.js"></script>
    <script src="js/aside-left.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/aside-right.js"></script>
    <script src="js/addProject.js"></script>

    <script>
        const soatElement = document.getElementById("soat");

        let savedTime = localStorage.getItem("soat");

        if (!savedTime) {
            const now = new Date();
            savedTime = `${now.toLocaleDateString()}`;
            localStorage.setItem("soat", savedTime);
        }

        soatElement.textContent = savedTime;

        lucide.createIcons();
    </script>
</body>

</html>
