<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildly — Show what you build. Find developers. And get hired.</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&family=Caprasimo&family=Cookie&family=Great+Vibes&family=Imperial+Script&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=TikTok+Sans:opsz,wdth@12..36,138&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="aside"></div>

    <nav class="mobile-bottom-nav">
        <a href="index.html">
            <i data-lucide="house"></i>
        </a>
        <a>
            <i data-lucide="compass"></i>
        </a>
        <a onclick="modalProject.style.display = 'flex'">
            <i data-lucide="plus"></i>
        </a>
        <a>
            <i data-lucide="MessageCircle"></i>
        </a>
        <a class="active" id="user">
            <i data-lucide="circle-user"></i>
        </a>
    </nav>

    <div class="buildy">
        <aside class="aside-left">
            <h1>Buildly</h1>
            <div class="aside-location">
                <button onclick="window.location.href = './index.html'">
                    <i class="icon-lucide" data-lucide="home"></i>
                    Asosiy
                </button>
                <button onclick="window.location.href = 'programist.html'">
                    <i class="icon-lucide" data-lucide="CodeXml"></i>
                    Dasturchilar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="FolderGit2"></i>
                    Loyihalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="users"></i>
                    Jamoalar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="compass"></i>
                    Kashf qiling
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="bookmark"></i>
                    Saqlanganlar
                </button>
                <button>
                    <i class="icon-lucide" data-lucide="MessageCircle"></i>
                    Xabarlar
                </button>
                <button onclick="window.location.href = 'settings.html'">
                    <i class="icon-lucide" data-lucide="settings"></i>
                    Sozlamalar
                </button>
                <div class="profile-card" id="profile-card">
                    <p>Ishlab chiquvchi profilingizni yarating, loyihalaringizni namoyish qiling va quruvchilar bilan
                        bog'laning.</p>
                    <button id="signUp">Ro'yxatdan o'tish</button>
                </div>
                <div class="aside-profile" onclick="window.location.href = 'profile.html'">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <img id="avatarr"
                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png"
                            alt="user-avatar">
                        <div>
                            <h2 id="userNamee"></h2>
                            <p id="userNikk"></p>
                        </div>
                    </div>
                    <div class="log">
                        <i class="icon-lucide" data-lucide="LogOut"></i>
                    </div>
                </div>
            </div>
        </aside>
        <div class="container">
            <main>
                <header></header>
                <div class="profile-html">
                    <div class="profile-header">
                        <div class="banner"></div>
                        <div class="profile-topbar">
                            <div class="avatar-wrapper">
                                <img id="avatar"
                                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png"
                                    alt="avatar">
                                <label for="avatarInput" class="avatar-edit">
                                    <i data-lucide="camera"></i>
                                </label>
                                <input type="file" id="avatarInput" accept="image/*" hidden>
                            </div>
                            <button class="edit-btn"
                                onclick="modal1.style.display='flex'; document.getElementById('h1').textContent='Profilni tahrirlash'; document.getElementById('btn').textContent='Saqlash';">
                                <i data-lucide="pencil"></i>
                                Tahrirlash
                            </button>
                        </div>
                        <div class="profile-info">
                            <h2 id="userName"></h2>
                            <p id="userNik"></p>
                            <p id="userBio"></p>
                            <p id="role"></p>
                        </div>
                        <div class="profile-links">
                            <a id="githubLink" target="_blank">
                                <i data-lucide="CodeXml"></i>
                                GitHub
                            </a>
                            <a id="websiteLink" target="_blank">
                                <i data-lucide="globe"></i>
                                Website
                            </a>
                            <a id="telegramLink" target="_blank">
                                <i data-lucide="send"></i>
                                Telegram
                            </a>
                            <a id="linkedinLink" target="_blank">
                                <i data-lucide="briefcase-business"></i>
                                Linkedin
                            </a>
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">
                                <p>0</p>
                                <h2>Loyihalar</h2>
                            </div>
                            <div class="stat-item">
                                <p>0</p>
                                <h2>Obunachilar</h2>
                            </div>
                            <div class="stat-item">
                                <p>0</p>
                                <h2>Obuna bo'lganlar</h2>
                            </div>
                        </div>
                        <div class="follow-row">
                            <button class="follow">Obuna bo'lish</button>
                        </div>
                    </div>
                </div>
                <h1 class="project">Loyihalarim</h1>
                <div class="projects">
                    <div class="empty-icon"><i data-lucide="briefcase-business"></i></div>
                    <h2>Hali loyihalaringiz yo'q.</h2>
                    <p>Loyiha yuklasangiz shu yerda ko'rinadi.</p>
                    <a href="index.html">
                        <button class="button">
                            <i data-lucide="plus"></i>
                            Birinchisini yuklang
                        </button>
                    </a>
                </div>
            </main>
        </div>
        <aside class="aside-right"></aside>
    </div>

    <div class="modal"></div>
    <div class="modal-project" id="modal-project"></div>

    <script src="js/navbar.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/addProject.js"></script>
    <script src="js/aside-right.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/modal-registar.js"></script>

</body>

</html>
